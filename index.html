<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - REST API Project</title>
    
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-cloud-sun-fill"></i> Weather Dashboard
            </span>
            <span class="text-white">REST API Integration</span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-4">
        
        <!-- Search Section -->
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="card shadow">
                    <div class="card-body">
                        <h5 class="card-title text-center mb-3">Search Weather by City</h5>
                        <div class="input-group">
                            <input type="text" id="cityInput" class="form-control" 
                                   placeholder="Enter city name (e.g., Lahore, London, Tokyo)">
                            <button class="btn btn-primary" id="searchBtn" type="button">
                                <i class="bi bi-search"></i> Search
                            </button>
                        </div>
                        <div class="form-text text-center mt-2">
                            Default cities: London, New York, Tokyo
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="text-center my-5 d-none">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Fetching weather data...</p>
        </div>

        <!-- Error Alert -->
        <div id="errorAlert" class="alert alert-danger alert-dismissible fade show d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <strong>Error!</strong> <span id="errorMessage"></span>
            <button type="button" class="btn-close" onclick="hideError()"></button>
        </div>

        <!-- Weather Cards Container -->
        <div class="row g-4" id="weatherCardsContainer">
            <!-- Weather cards will be dynamically generated here using JavaScript -->
        </div>

        <!-- API Info Footer -->
        <div class="row mt-5 mb-4">
            <div class="col-12">
                <div class="card bg-light">
                    <div class="card-body text-center">
                        <h6 class="card-subtitle mb-2 text-muted">
                            <i class="bi bi-info-circle"></i> REST API Technology Stack
                        </h6>
                        <p class="card-text small">
                            <strong>Design Pattern:</strong> REST (GET requests) | 
                            <strong>Data Format:</strong> JSON | 
                            <strong>API:</strong> OpenWeatherMap Public API
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
